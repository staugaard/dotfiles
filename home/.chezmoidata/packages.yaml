packages:
  darwin:
    taps:
      - vektra/tap
    brews:
      - git
      - htop
      - ctop
      - wget
      - autojump
      - thefuck
      - micro
      - go
      - nvm
      - yarn
      - direnv
      - gh
      - zsh-autosuggestions
      - zsh-syntax-highlighting
      - oh-my-posh
      - mockery
    casks:
      - istat-menus
      - font-hack-nerd-font
    ghExtensions:
      - seachicken/gh-poi
  linux:
    apt:
      - htop
      - wget
      - thefuck
      - zsh
      - zsh-autosuggestions
      - zsh-syntax-highlighting
      - micro
      - golang-go
    fonts:
      version: 3.4.0
      archiveUrl: https://github.com/ryanoasis/nerd-fonts/releases/download/v3.4.0/Hack.tar.xz
      archiveSha256: 1d00a1435638084174516975840854368a45ac30bb0bad2c0c49db713b5925f0
      files:
        - HackNerdFontMono-Bold.ttf
        - HackNerdFontMono-BoldItalic.ttf
        - HackNerdFontMono-Italic.ttf
        - HackNerdFontMono-Regular.ttf
  cargo:
    crates:
      - name: eza
        command: eza
        args: []
      - name: zoxide
        command: zoxide
        args:
          - --locked
  ohMyPosh:
    installDir: .zsh
